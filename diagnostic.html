<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Test - English Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header>
  <nav class="navbar" id="navbar" aria-label="Main navigation">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon" aria-hidden="true">EN</span>
      English Up
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="speaking.html">Speaking</a></li>
      <li><a href="grammar.html">Writing</a></li>
      <li><a href="reading.html">Reading</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user" id="userMenu" aria-labelledby="userName">
        <div class="nav-user-avatar" id="userAvatar" aria-hidden="true">--</div>
        <span id="userName">Loading...</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()" aria-label="Log out">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </nav>
  </header>

  <main id="main-content">
  <div class="test-page">
    <div class="test-container">
      <div class="test-header">
        <h1 id="diagnosticTitle" tabindex="0">Diagnostic Test</h1>
        <p id="diagnosticInstructions" tabindex="0">Answer all questions carefully. Your results will determine your starting level.</p>
      </div>

      <div id="diagnosticAnnounce" class="sr-only" lang="en-US" aria-live="polite" aria-atomic="true"></div>

      <div class="test-progress" id="testProgress" role="progressbar" tabindex="0" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Test progress">
        <div class="test-progress-bar">
          <div class="test-progress-fill" id="testProgressFill" style="width: 0%"></div>
        </div>
        <span class="test-progress-text" id="testProgressText">0/0</span>
      </div>

      <div id="questionContainer" lang="en-US">
        <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
          <p>Loading diagnostic questions...</p>
        </div>
      </div>

      <div class="question-nav">
        <button class="btn btn-ghost" id="prevBtn" onclick="prevQuestion()" disabled aria-label="Previous question">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Previous
        </button>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" aria-label="Next question">
          Next question
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentUser = null;
    let questions = [];
    let currentQuestion = 0;
    let hasPositionedInitialFocus = false;
    let answers = {};
    let correctCount = 0;

    async function init() {
      currentUser = await getUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      let profile = await getProfile(currentUser.id);
      if (!profile) {
        profile = { full_name: currentUser.email, level: 'A1', streak: 0, total_exercises: 0, accuracy: 0 };
      }
      const initials = profile.full_name ? profile.full_name.split(' ').map(n => n[0]).join('').toUpperCase() : currentUser.email[0].toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = profile.full_name || currentUser.email;

      try {
        const grammarExercises = await getExercises('grammar');
        const vocabExercises = await getExercises('vocabulary');
        questions = [...grammarExercises.slice(0, 5), ...vocabExercises.slice(0, 5)];

        if (questions.length === 0) {
          document.getElementById('questionContainer').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);"><p>No diagnostic questions available.</p><a href="dashboard.html" class="btn btn-primary" style="margin-top:1rem;">Go to Dashboard</a></div>';
          return;
        }

        document.getElementById('testProgressText').textContent = `0/${questions.length}`;
        document.getElementById('testProgressText').setAttribute('aria-label', 'Diagnostic test, question 0 of ' + questions.length);
        renderQuestion();
      } catch (error) {
        console.error('Error loading diagnostic:', error);
      }
    }

    function announceDiagnostic(message) {
      const liveRegion = document.getElementById('diagnosticAnnounce');
      if (!liveRegion) return;
      liveRegion.textContent = '';
      setTimeout(function() {
        liveRegion.textContent = message;
      }, 50);
    }

    function renderQuestion() {
      if (currentQuestion >= questions.length) {
        finishTest();
        return;
      }

      const q = questions[currentQuestion];
      const options = q.options || [];
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('testProgressFill').style.width = progress + '%';
      document.getElementById('testProgress').setAttribute('aria-valuenow', Math.round(progress));
      document.getElementById('testProgressText').textContent = `${currentQuestion + 1}/${questions.length}`;
      document.getElementById('testProgressText').setAttribute('aria-label', 'Diagnostic test, question ' + (currentQuestion + 1) + ' of ' + questions.length);

      document.getElementById('prevBtn').disabled = currentQuestion === 0;

      if (currentQuestion === questions.length - 1) {
        document.getElementById('nextBtn').innerHTML = 'Finish Test <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>';
      } else {
        document.getElementById('nextBtn').innerHTML = 'Next question <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
      }

      const selectedAnswer = answers[q.id] || '';

      document.getElementById('questionContainer').innerHTML = `
        <div class="question-card fade-in" id="questionCard" tabindex="-1">
          <div class="question-number" id="questionNumber" tabindex="0">Question ${currentQuestion + 1} of ${questions.length}</div>
          <div class="question-text" id="questionText" lang="en-US" tabindex="0" role="heading" aria-level="2">${q.question}</div>
          <div class="options-list" aria-label="Answer choices for question ${currentQuestion + 1}">
            ${options.map(opt => `
              <button type="button" class="option-item ${selectedAnswer === opt ? 'selected' : ''}" lang="en-US" aria-pressed="${selectedAnswer === opt}" data-value="${opt}" onclick="selectAnswer('${q.id}', '${opt.replace(/'/g, "\\'")}', this)">
                <div class="option-radio" aria-hidden="true"></div>
                <span class="option-text">${opt}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;

      const questionNumber = document.getElementById('questionNumber');
      const questionText = document.getElementById('questionText');
      if (!hasPositionedInitialFocus) {
        const diagnosticTitle = document.getElementById('diagnosticTitle');
        if (diagnosticTitle) diagnosticTitle.focus();
        hasPositionedInitialFocus = true;
      } else {
        if (questionNumber) questionNumber.focus();
      }
    }

    function selectAnswer(qId, answer, el) {
      document.querySelectorAll('.option-item').forEach(o => {
        o.classList.remove('selected');
        o.setAttribute('aria-pressed', 'false');
      });
      el.classList.add('selected');
      el.setAttribute('aria-pressed', 'true');
      answers[qId] = answer;
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        finishTest();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    async function finishTest() {
      correctCount = 0;
      for (const q of questions) {
        if (answers[q.id] === q.correct_answer) {
          correctCount++;
          await saveProgress(currentUser.id, q.id, true, answers[q.id]);
        } else if (answers[q.id]) {
          await saveProgress(currentUser.id, q.id, false, answers[q.id]);
        }
      }

      const percentage = Math.round((correctCount / questions.length) * 100);
      let level = 'A1';
      if (percentage >= 90) level = 'C1';
      else if (percentage >= 80) level = 'B2';
      else if (percentage >= 70) level = 'B1+';
      else if (percentage >= 60) level = 'B1';
      else if (percentage >= 50) level = 'A2';

      await updateProfile(currentUser.id, { level });
      await saveScore(currentUser.id, correctCount, questions.length, 'diagnostic');
      await updateStreak(currentUser.id);

      document.getElementById('questionContainer').innerHTML = `
        <div class="question-card fade-in" style="text-align: center;">
          <div style="font-size: 4rem; margin-bottom: 1rem;">🏆</div>
          <h2 style="margin-bottom: 1rem;">Test Complete!</h2>
          <div class="stat-value green" style="font-size: 3rem; margin-bottom: 0.5rem;">${percentage}%</div>
          <p style="color: var(--text-secondary); margin-bottom: 1rem;">You got ${correctCount} out of ${questions.length} correct</p>
          <div class="level-badge" style="display: inline-flex; margin-bottom: 2rem;">
            Your Level: ${level}
          </div>
          <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
            <a href="activities.html?module=grammar" class="btn btn-outline">Start Learning</a>
          </div>
        </div>
      `;

      document.getElementById('testProgressFill').style.width = '100%';
      document.getElementById('testProgress').setAttribute('aria-valuenow', '100');
      document.getElementById('testProgressText').textContent = 'Complete!';
      document.getElementById('testProgressText').setAttribute('aria-label', 'Diagnostic test complete');
      document.querySelector('.question-nav').style.display = 'none';
      announceDiagnostic('Diagnostic test complete. Your level is ' + level + '. You answered ' + correctCount + ' out of ' + questions.length + ' correctly.');
    }

    async function handleLogout() { await signOut(); window.location.href = 'index.html'; }

    init();
  </script>
</body>
</html>
