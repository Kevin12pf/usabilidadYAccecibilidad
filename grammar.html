<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammar - English Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header>
  <nav class="navbar" id="navbar" aria-label="Main navigation">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon" aria-hidden="true">EN</span>
      English Up
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="speaking.html">Speaking</a></li>
      <li><a href="grammar.html" class="active" aria-current="page">Writing</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user" id="userMenu" role="button" aria-label="User menu">
        <div class="nav-user-avatar" id="userAvatar" aria-hidden="true">--</div>
        <span id="userName">Loading...</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()" aria-label="Log out">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </nav>
  </header>

  <main id="main-content">
  <div class="activities-page">
    <div class="activities-container">
      <aside class="sidebar" aria-label="Writing module navigation">
        <p class="sidebar-title">Writing Module</p>
        <ul class="sidebar-menu">
          <li><a href="#" class="active" aria-current="true">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Writing Exercises
          </a></li>
        </ul>
      </aside>

      <div class="activity-main">
        <div class="activity-header">
          <h1>Writing — B1</h1>
          <span style="color: var(--text-secondary);" id="questionCounter">Question 1 of 0</span>
        </div>

        <div class="activity-content" id="exerciseContent" aria-live="polite">
          <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            <p>Loading exercises...</p>
          </div>
        </div>

        <div class="stats-sidebar" aria-label="Session statistics">
          <h3>
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            Stats
          </h3>
          <div class="stat-row">
            <span class="stat-label">Your Session</span>
            <span class="stat-number" style="color: var(--primary);" id="sessionTotal">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Correct</span>
            <span class="stat-number green" id="correctCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Incorrect</span>
            <span class="stat-number red" id="incorrectCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Grade</span>
            <span class="stat-number" style="color: var(--primary);" id="practiceGrade">--</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentUser = null;
    let exercises = [];
    let currentIndex = 0;
    let correctAnswers = 0;
    let incorrectAnswers = 0;

    async function init() {
      currentUser = await getUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      const diagnosticDone = await hasCompletedDiagnostic(currentUser.id);
      if (!diagnosticDone) {
        window.location.href = 'diagnostic.html';
        return;
      }

      let profile = await getProfile(currentUser.id);
      if (!profile) {
        profile = { full_name: currentUser.email, level: 'A1', streak: 0, total_exercises: 0, accuracy: 0 };
      }
      const initials = profile.full_name ? profile.full_name.split(' ').map(n => n[0]).join('').toUpperCase() : currentUser.email[0].toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = profile.full_name || currentUser.email;

      try {
        exercises = await getExercises('writing', profile.level);
        if (exercises.length === 0) {
          document.getElementById('exerciseContent').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);"><p>No writing exercises available yet.</p></div>';
          return;
        }
        renderExercise();
      } catch (error) {
        console.error('Error loading writing exercises:', error);
      }
    }

    function renderExercise() {
      if (currentIndex >= exercises.length) {
        showResults();
        return;
      }

      const ex = exercises[currentIndex];
      const options = ex.options || [];
      document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${exercises.length}`;
      document.getElementById('sessionTotal').textContent = currentIndex + 1;

      let optionsHtml = '';
      if (options.length > 0) {
        optionsHtml = '<div class="options-list" role="radiogroup" aria-label="Answer options">' + options.map((opt, i) =>
          `<div class="option-item" role="radio" aria-checked="false" data-value="${opt}" onclick="selectOption(this, '${opt.replace(/'/g, "\\'")}')">
            <div class="option-radio" aria-hidden="true"></div>
            <span class="option-text">${opt}</span>
          </div>`
        ).join('') + '</div>';
      }

      document.getElementById('exerciseContent').innerHTML = `
        <div class="question-card fade-in">
          <div class="question-number">Question ${currentIndex + 1} of ${exercises.length}</div>
          <div class="question-text">${ex.question}</div>
          ${optionsHtml}
        </div>
        <div id="feedbackArea"></div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button class="btn btn-ghost" onclick="prevExercise()" ${currentIndex === 0 ? 'disabled' : ''} style="flex:1;" aria-label="Previous exercise">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Previous
          </button>
          <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" style="flex:2;">
            Check Answer
          </button>
        </div>
      `;
    }

    function selectOption(el, value) {
      document.querySelectorAll('.option-item').forEach(o => {
        o.classList.remove('selected');
        o.setAttribute('aria-checked', 'false');
      });
      el.classList.add('selected');
      el.setAttribute('aria-checked', 'true');
    }

    async function checkAnswer() {
      const selected = document.querySelector('.option-item.selected');
      if (!selected) return;

      const ex = exercises[currentIndex];
      const answer = selected.dataset.value;
      const isCorrect = answer === ex.correct_answer;

      document.querySelectorAll('.option-item').forEach(opt => {
        opt.style.pointerEvents = 'none';
        if (opt.dataset.value === ex.correct_answer) opt.classList.add('correct');
        else if (opt.classList.contains('selected') && !isCorrect) opt.classList.add('incorrect');
      });

      if (isCorrect) correctAnswers++;
      else incorrectAnswers++;

      try {
        await saveProgress(currentUser.id, ex.id, isCorrect, answer);
        await updateStreak(currentUser.id);
      } catch(e) { console.error(e); }

      const feedbackArea = document.getElementById('feedbackArea');
      feedbackArea.innerHTML = `
        <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="margin-top:1rem;" role="status" aria-live="polite">
          <div class="feedback-title">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">${isCorrect
              ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
              : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}
            </svg>
            ${isCorrect ? 'Correct!' : 'Incorrect'}
          </div>
          <p class="feedback-text">${ex.explanation || (isCorrect ? 'Well done!' : 'The correct answer is: ' + ex.correct_answer)}</p>
        </div>
      `;

      document.getElementById('checkBtn').textContent = 'Next Exercise';
      document.getElementById('checkBtn').onclick = nextExercise;
      updateStats();
    }

    function nextExercise() {
      currentIndex++;
      renderExercise();
    }

    function prevExercise() {
      if (currentIndex > 0) {
        currentIndex--;
        renderExercise();
      }
    }

    function updateStats() {
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('incorrectCount').textContent = incorrectAnswers;
      const total = correctAnswers + incorrectAnswers;
      if (total > 0) {
        const grade = correctAnswers / total >= 0.9 ? 'A+' : correctAnswers / total >= 0.8 ? 'A' : correctAnswers / total >= 0.7 ? 'B' : correctAnswers / total >= 0.6 ? 'C' : 'D';
        document.getElementById('practiceGrade').textContent = grade;
      }
    }

    function showResults() {
      const percentage = exercises.length > 0 ? Math.round((correctAnswers / exercises.length) * 100) : 0;
      saveScore(currentUser.id, correctAnswers, exercises.length, 'writing').catch(console.error);

      document.getElementById('exerciseContent').innerHTML = `
        <div class="question-card fade-in" style="text-align:center;">
          <div style="font-size:4rem;margin-bottom:1rem;">${percentage >= 70 ? '🎉' : '📚'}</div>
          <h2 style="margin-bottom:1rem;">Module Complete!</h2>
          <div class="stat-value green" style="font-size:3rem;margin-bottom:1rem;">${percentage}%</div>
          <p style="color:var(--text-secondary);margin-bottom:2rem;">You got ${correctAnswers} out of ${exercises.length} correct</p>
          <div style="display:flex;gap:1rem;justify-content:center;">
            <button class="btn btn-outline" onclick="location.reload()">Try Again</button>
            <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
          </div>
        </div>
      `;
      document.getElementById('questionCounter').textContent = 'Complete!';
    }

    async function handleLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
