  <main id="main-content">
  <div class="activities-page">
    <div class="activities-container">
      <aside class="sidebar" aria-label="Writing module navigation">
        <p class="sidebar-title">Writing Module</p>
        <ul class="sidebar-menu">
          <li><a href="#" class="active" aria-current="true">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Writing Exercises
          </a></li>
        </ul>
      </aside>

      <div class="activity-main">
        <div class="activity-header">
          <h1>Writing Practice</h1>
          <span style="color: var(--text-secondary);" id="questionCounter" aria-live="polite">Question 1 of 0</span>
        </div>

        <div class="activity-content" id="exerciseContent" aria-live="polite">
          <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            <p>Loading exercises...</p>
          </div>
        </div>

        <div id="screenReaderAnnounce" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

        <div class="stats-sidebar" aria-label="Session statistics">
          <h3>
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            Stats
          </h3>
          <div class="stat-row">
            <span class="stat-label">Your Session</span>
            <span class="stat-number" style="color: var(--primary);" id="sessionTotal">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Correct</span>
            <span class="stat-number green" id="correctCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Incorrect</span>
            <span class="stat-number red" id="incorrectCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Grade</span>
            <span class="stat-number" style="color: var(--primary);" id="practiceGrade">--</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    var currentUser = null;
    var exercises = [];
    var currentIndex = 0;
    var correctAnswers = 0;
    var incorrectAnswers = 0;
    var announceTimeout = null;

    function announce(text) {
      var el = document.getElementById('screenReaderAnnounce');
      if (announceTimeout) clearTimeout(announceTimeout);
      el.textContent = '';
      announceTimeout = setTimeout(function() { el.textContent = text; }, 100);
    }

    async function init() {
      currentUser = await getUser();
      if (!currentUser) { window.location.href = 'login.html'; return; }

      var diagnosticDone = await hasCompletedDiagnostic(currentUser.id);
      if (!diagnosticDone) { window.location.href = 'diagnostic.html'; return; }

      var profile = await getProfile(currentUser.id);
      if (!profile) profile = { full_name: currentUser.email, level: 'A1', streak: 0, total_exercises: 0, accuracy: 0 };
      var initials = profile.full_name ? profile.full_name.split(' ').map(function(n) { return n[0]; }).join('').toUpperCase() : currentUser.email[0].toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = profile.full_name || currentUser.email;

      try {
        exercises = await getExercises('writing', profile.level);
        if (exercises.length === 0) {
          document.getElementById('exerciseContent').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);"><p>No writing exercises available yet.</p></div>';
          return;
        }
        renderExercise();
      } catch (error) { console.error('Error loading writing exercises:', error); }
    }

    function normalizeAnswer(str) {
      return str.trim().replace(/\s+/g, ' ').replace(/[^a-zA-Z0-9\s'-]/g, '').toLowerCase();
    }

    function isAnswerCorrect(userAnswer, correctAnswer) {
      var normalized = normalizeAnswer(userAnswer);
      var correct = normalizeAnswer(correctAnswer);
      if (normalized === correct) return true;
      var normWords = normalized.split(/\s+/);
      var correctWords = correct.split(/\s+/);
      if (normWords.length === 1 && correctWords.length >= 3) {
        return normWords[0] === correctWords[0] || normWords[0] === correctWords[correctWords.length - 1];
      }
      if (correctWords.length >= 3) {
        var matchCount = 0;
        for (var i = 0; i < correctWords.length; i++) {
          for (var j = 0; j < normWords.length; j++) {
            if (normWords[j] === correctWords[i]) { matchCount++; break; }
          }
        }
        if (matchCount >= Math.ceil(correctWords.length * 0.6)) return true;
      }
      return false;
    }

    function renderExercise() {
      if (currentIndex >= exercises.length) { showResults(); return; }

      var ex = exercises[currentIndex];
      document.getElementById('questionCounter').textContent = 'Question ' + (currentIndex + 1) + ' of ' + exercises.length;
      document.getElementById('questionCounter').setAttribute('aria-label', 'Question ' + (currentIndex + 1) + ' of ' + exercises.length);
      document.getElementById('sessionTotal').textContent = currentIndex + 1;

      document.getElementById('exerciseContent').innerHTML =
        '<div class="question-card fade-in" role="region" aria-label="Exercise ' + (currentIndex + 1) + '" tabindex="-1" id="questionCard">' +
          '<div class="question-number">Question ' + (currentIndex + 1) + ' of ' + exercises.length + '</div>' +
          '<div class="question-text" id="questionText">' + ex.question + '</div>' +
          '<div style="margin-top: 1.5rem;">' +
            '<label for="answerInput" style="font-weight: 600; display: block; margin-bottom: 0.5rem;">Type your answer:</label>' +
            '<input type="text" id="answerInput" name="answer" autocomplete="off" spellcheck="true" ' +
              'style="width: 100%; padding: 0.85rem 1rem; font-size: 1rem; border: 2px solid var(--border); border-radius: var(--radius-md); background: var(--bg-card); color: var(--text-primary); transition: border-color 0.2s;" ' +
              'placeholder="Write your answer here..." aria-describedby="questionText">' +
          '</div>' +
        '</div>' +
        '<div id="feedbackArea" role="status" aria-live="polite" aria-atomic="true"></div>' +
        '<div style="display: flex; gap: 1rem; margin-top: 1.5rem;">' +
          '<button class="btn btn-ghost" onclick="prevExercise()" ' + (currentIndex === 0 ? 'disabled' : '') + ' style="flex:1;" aria-label="Previous exercise">' +
            '<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>' +
            ' Previous' +
          '</button>' +
          '<button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" style="flex:2;">Check Answer</button>' +
        '</div>';

      var input = document.getElementById('answerInput');
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkAnswer();
        }
      });
      input.focus();
    }

    async function checkAnswer() {
      var input = document.getElementById('answerInput');
      if (!input) return;
      var userAnswer = input.value.trim();
      if (!userAnswer) {
        announce('Please type your answer before checking.');
        return;
      }

      var ex = exercises[currentIndex];
      var isCorrect = isAnswerCorrect(userAnswer, ex.correct_answer);

      input.disabled = true;
      input.style.borderColor = isCorrect ? 'var(--success)' : 'var(--danger)';

      if (isCorrect) correctAnswers++;
      else incorrectAnswers++;

      try {
        await saveProgress(currentUser.id, ex.id, isCorrect, userAnswer);
        await updateStreak(currentUser.id);
      } catch(e) { console.error(e); }

      var feedbackArea = document.getElementById('feedbackArea');
      feedbackArea.innerHTML =
        '<div class="feedback-box ' + (isCorrect ? 'correct' : 'incorrect') + '" style="margin-top:1rem;">' +
          '<div class="feedback-title">' +
            '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">' + (isCorrect
              ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
              : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>') +
            '</svg>' +
            (isCorrect ? 'Correct!' : 'Incorrect') +
          '</div>' +
          '<p class="feedback-text">' + (isCorrect
            ? (ex.explanation || 'Well done!')
            : 'The correct answer is: <strong>' + ex.correct_answer + '</strong>. ' + (ex.explanation || '')) + '</p>' +
          '<p style="margin-top:0.5rem;font-size:0.85rem;color:var(--text-secondary);">Your answer: "' + userAnswer + '"</p>' +
        '</div>';

      var btn = document.getElementById('checkBtn');
      btn.textContent = 'Next Exercise';
      btn.onclick = nextExercise;
      btn.focus();
      updateStats();
      announce(isCorrect ? 'Correct! Moving to next exercise.' : 'Incorrect. The correct answer is ' + ex.correct_answer + '. Moving to next exercise.');
    }

    function nextExercise() {
      currentIndex++;
      renderExercise();
    }

    function prevExercise() {
      if (currentIndex > 0) { currentIndex--; renderExercise(); }
    }

    function updateStats() {
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('incorrectCount').textContent = incorrectAnswers;
      var total = correctAnswers + incorrectAnswers;
      if (total > 0) {
        var grade = correctAnswers / total >= 0.9 ? 'A+' : correctAnswers / total >= 0.8 ? 'A' : correctAnswers / total >= 0.7 ? 'B' : correctAnswers / total >= 0.6 ? 'C' : 'D';
        document.getElementById('practiceGrade').textContent = grade;
      }
    }

    function showResults() {
      var percentage = exercises.length > 0 ? Math.round((correctAnswers / exercises.length) * 100) : 0;
      saveScore(currentUser.id, correctAnswers, exercises.length, 'writing').catch(console.error);

      document.getElementById('exerciseContent').innerHTML =
        '<div class="question-card fade-in" style="text-align:center;">' +
          '<div style="font-size:4rem;margin-bottom:1rem;" aria-hidden="true">' + (percentage >= 70 ? '\uD83C\uDF89' : '\uD83D\uDCDA') + '</div>' +
          '<h2 style="margin-bottom:1rem;">Module Complete!</h2>' +
          '<div class="stat-value green" style="font-size:3rem;margin-bottom:1rem;" role="text" aria-label="Score ' + percentage + ' percent">' + percentage + '%</div>' +
          '<p style="color:var(--text-secondary);margin-bottom:2rem;">You got ' + correctAnswers + ' out of ' + exercises.length + ' correct</p>' +
          '<div style="display:flex;gap:1rem;justify-content:center;">' +
            '<button class="btn btn-outline" onclick="location.reload()">Try Again</button>' +
            '<a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>' +
          '</div>' +
        '</div>';
      document.getElementById('questionCounter').textContent = 'Complete!';
      document.getElementById('questionCounter').setAttribute('aria-label', 'Module complete');
      announce('Module complete. You scored ' + percentage + ' percent.');
    }

    async function handleLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
