<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - English Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header>
  <nav class="navbar" aria-label="Main navigation">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon" aria-hidden="true">EN</span>
      English Up
    </a>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-ghost">Log In</a>
      <a href="login.html?mode=signup" class="btn btn-primary">Sign Up Free</a>
    </div>
  </nav>
  </header>

  <main id="main-content">
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-icon" aria-hidden="true">
            <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <h1 id="authTitle">Welcome back</h1>
          <p id="authSubtitle">Log in to continue your English learning journey</p>
        </div>

        <div id="errorMsg" role="alert" aria-live="assertive" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#EF4444;padding:12px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;"></div>
        <div id="successMsg" role="status" aria-live="polite" style="display:none;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10B981;padding:12px;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;"></div>

        <form id="authForm">
          <div class="form-group" id="nameGroup" style="display:none;">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" class="form-input" placeholder="Your full name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
          </div>
          <div class="form-group" id="passwordGroup">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min 6 characters" required minlength="6">
          </div>
          <div class="form-group" id="newPasswordGroup" style="display:none;">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" class="form-input" placeholder="Min 6 characters" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:1rem;" id="submitBtn">
            <span id="submitText">Log In</span>
          </button>
        </form>

        <div class="auth-footer" id="forgotGroup" style="margin-bottom:0.75rem;">
          <span>Forgot your password?</span>
          <a href="#" id="forgotLink">Reset it</a>
        </div>
        <div class="auth-footer">
          <span id="toggleText">Don't have an account?</span>
          <a href="#" id="toggleLink">Sign up for free</a>
        </div>
        <div class="auth-footer" id="resendGroup" style="display:none;margin-top:0.75rem;">
          <span>Didn't get the email?</span>
          <a href="#" id="resendLink">Resend confirmation</a>
        </div>
      </div>
    </div>
  </div>
  </main>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let isSignUp = false;
    let isResetMode = false;
    const $ = id => document.getElementById(id);

    async function waitForAuthenticatedUser(maxAttempts = 5, delayMs = 150) {
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const user = await getUser().catch(() => null);
        if (user) return user;
        await new Promise(resolve => setTimeout(resolve, delayMs));
      }
      return null;
    }

    function showError(message) {
      $('errorMsg').textContent = message;
      $('errorMsg').style.display = 'block';
    }

    function showSuccess(message) {
      $('successMsg').textContent = message;
      $('successMsg').style.display = 'block';
    }

    function clearMessages() {
      $('errorMsg').style.display = 'none';
      $('successMsg').style.display = 'none';
    }

    function setMode(signup) {
      isSignUp = signup;
      isResetMode = false;
      $('authTitle').textContent = signup ? 'Create account' : 'Welcome back';
      $('authSubtitle').textContent = signup ? 'Start your English learning journey' : 'Log in to continue';
      $('submitText').textContent = signup ? 'Sign Up' : 'Log In';
      $('toggleText').textContent = signup ? 'Already have an account?' : "Don't have an account?";
      $('toggleLink').textContent = signup ? 'Log in' : 'Sign up for free';
      $('nameGroup').style.display = signup ? 'block' : 'none';
      $('passwordGroup').style.display = 'block';
      $('newPasswordGroup').style.display = 'none';
      $('forgotGroup').style.display = signup ? 'none' : 'block';
      $('resendGroup').style.display = 'none';
      $('password').required = true;
      $('newPassword').required = false;
      clearMessages();
    }

    function setResetMode() {
      isSignUp = false;
      isResetMode = true;
      $('authTitle').textContent = 'Create new password';
      $('authSubtitle').textContent = 'Enter your new password to recover access';
      $('submitText').textContent = 'Update Password';
      $('toggleText').textContent = 'Remember your password?';
      $('toggleLink').textContent = 'Log in';
      $('nameGroup').style.display = 'none';
      $('passwordGroup').style.display = 'none';
      $('newPasswordGroup').style.display = 'block';
      $('forgotGroup').style.display = 'none';
      $('resendGroup').style.display = 'none';
      $('password').required = false;
      $('newPassword').required = true;
      clearMessages();
    }

    function getAuthParams() {
      const search = new URLSearchParams(window.location.search);
      const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      return { search, hash };
    }

    function isExistingAccountResponse(data) {
      return Boolean(data?.user && Array.isArray(data.user.identities) && data.user.identities.length === 0);
    }

    $('toggleLink').addEventListener('click', function(e) {
      e.preventDefault();
      setMode(isResetMode ? false : !isSignUp);
    });

    $('forgotLink').addEventListener('click', async function(e) {
      e.preventDefault();
      clearMessages();

      const email = $('email').value.trim();
      if (!email) {
        showError('Enter your email first, then request the password reset.');
        return;
      }

      try {
        if (!initSupabase()) throw new Error('Supabase client failed to initialize. Reload the page.');
        await resetPassword(email);
        showSuccess('Password reset email sent. Check your inbox and spam folder.');
      } catch (err) {
        showError(err.message || 'Could not send the password reset email. Try again later.');
      }
    });

    $('resendLink').addEventListener('click', async function(e) {
      e.preventDefault();
      clearMessages();

      const email = $('email').value.trim();
      if (!email) {
        showError('Enter your email first, then request the confirmation again.');
        return;
      }

      try {
        if (!initSupabase()) throw new Error('Supabase client failed to initialize. Reload the page.');
        await resendConfirmation(email);
        showSuccess('Confirmation email sent again. Check your inbox and spam folder.');
      } catch (err) {
        showError(err.message || 'Could not resend the confirmation email. Try again later.');
      }
    });

    $('authForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      clearMessages();

      const email = $('email').value.trim();
      const password = $('password').value;
      const newPassword = $('newPassword').value;
      const btn = $('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        if (!initSupabase()) throw new Error('Supabase client failed to initialize. Reload the page.');

        if (isResetMode) {
          if (newPassword.length < 6) throw new Error('Password must have at least 6 characters.');
          await updateUserPassword(newPassword);
          showSuccess('Password updated. You can log in with your new password.');
          $('newPassword').value = '';
          setTimeout(() => setMode(false), 2500);
        } else if (isSignUp) {
          const fullName = $('fullName').value || email.split('@')[0];
          const data = await signUp(email, password, fullName);
          if (isExistingAccountResponse(data)) {
            showError('Esta cuenta ya esta registrada. Inicia sesion o usa Reset it si olvidaste tu contrasena.');
            $('forgotGroup').style.display = 'block';
            setTimeout(() => setMode(false), 2500);
            return;
          }
          showSuccess('Account created! Check your email to confirm it. If it does not arrive, use Resend confirmation.');
          $('resendGroup').style.display = 'block';
          setTimeout(() => setMode(false), 4000);
        } else {
          const result = await signIn(email, password);
          const user = result?.session?.user || await waitForAuthenticatedUser();
          if (!user) throw new Error('Login succeeded, but the user session was not ready. Try again.');
          const diagnosticDone = await hasCompletedDiagnostic(user.id);
          if (!diagnosticDone) {
            window.location.replace('diagnostic.html');
          } else {
            window.location.replace('dashboard.html');
          }
        }
      } catch (err) {
        const message = (err.message || '').toLowerCase();
        if (isSignUp && (message.includes('already') || message.includes('registered') || message.includes('exists'))) {
          showError('Esta cuenta ya esta registrada. Inicia sesion o usa Reset it si olvidaste tu contrasena.');
          $('forgotGroup').style.display = 'block';
          setTimeout(() => setMode(false), 2500);
        } else {
          showError(err.message || 'Something went wrong. Try again.');
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span id="submitText">' + (isResetMode ? 'Update Password' : isSignUp ? 'Sign Up' : 'Log In') + '</span>';
      }
    });

    document.addEventListener('DOMContentLoaded', async function() {
      const { search, hash } = getAuthParams();
      if (search.get('mode') === 'signup') setMode(true);

      if (search.get('type') === 'recovery' || hash.get('type') === 'recovery') {
        setResetMode();
        showSuccess('Email verified. Set your new password.');
      } else if (search.get('type') === 'signup' || hash.get('type') === 'signup') {
        showSuccess('Email confirmed. You can log in now.');
      }

      if (!initSupabase()) {
        showError('Supabase library not loaded. Reload the page.');
      }
    });
  </script>
</body>
</html>
