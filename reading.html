<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading - English Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .reading-passage { background: var(--bg-main); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid var(--primary); font-size: 1.05rem; line-height: 1.8; }
    .reading-passage h3 { font-size: 1.1rem; margin-bottom: 0.75rem; color: var(--primary); }
    .reading-question { background: var(--bg-card); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; border: 1px solid var(--border); }
    .reading-question h4 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.75rem; }
    .question-number { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; background: rgba(108,60,225,0.1); color: var(--primary); border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; margin: 0 auto 1.5rem; }
    .score-circle.excellent { background: rgba(16,185,129,0.1); color: var(--success); border: 4px solid var(--success); }
    .score-circle.good { background: rgba(245,158,11,0.1); color: var(--warning); border: 4px solid var(--warning); }
    .score-circle.needs-work { background: rgba(239,68,68,0.1); color: var(--danger); border: 4px solid var(--danger); }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand"><span class="brand-icon">EN</span> English Up</a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="speaking.html">Speaking</a></li>
      <li><a href="reading.html" class="active">Reading</a></li>
      <li><a href="grammar.html">Writing</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user"><div class="nav-user-avatar" id="userAvatar">--</div><span id="userName">Loading...</span></div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </nav>

  <div class="activities-page">
    <div class="activities-container">
      <aside class="sidebar">
        <p class="sidebar-title">Reading Module</p>
        <ul class="sidebar-menu">
          <li><a href="#" class="active">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Comprehension
          </a></li>
        </ul>
        <div style="padding:1rem;margin-top:1rem;">
          <div style="background:var(--bg-main);border-radius:var(--radius-md);padding:1rem;text-align:center;">
            <div style="font-size:2rem;margin-bottom:0.5rem;" id="levelBadge">A1</div>
            <div style="font-size:0.8rem;color:var(--text-secondary);">Current Level</div>
          </div>
        </div>
      </aside>

      <main class="activity-main">
        <div class="activity-header">
          <h1>Reading Comprehension</h1>
          <span style="color:var(--text-secondary);" id="questionCounter">Passage 1 of 0</span>
        </div>
        <div id="readingContent">
          <div style="text-align:center;padding:3rem;color:var(--text-secondary);"><p>Loading...</p></div>
        </div>
        <div class="stats-sidebar">
          <h3><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg> Session Stats</h3>
          <div class="stat-row"><span class="stat-label">Correct</span><span class="stat-number green" id="correctCount">0</span></div>
          <div class="stat-row"><span class="stat-label">Incorrect</span><span class="stat-number red" id="incorrectCount">0</span></div>
          <div class="stat-row"><span class="stat-label">Accuracy</span><span class="stat-number" style="color:var(--primary);" id="accuracyVal">0%</span></div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentUser = null;
    let passages = [];
    let currentPassageIndex = 0;
    let correctAnswers = 0;
    let incorrectAnswers = 0;
    let answeredQuestions = {};

    const readingPassages = [
      {
        id:'r1', title:'A Day at School', level:'A1',
        passage:'Maria wakes up at 7:00 in the morning. She brushes her teeth and eats breakfast with her family. Her mother makes eggs and toast every day. After breakfast, Maria walks to school. Her school is near her house, so it takes only ten minutes. She has classes from 8:00 to 3:00. Her favorite subject is science because she likes doing experiments. After school, she plays soccer with her friends in the park. She goes home at 5:00 and does her homework. In the evening, she reads a book before going to bed.',
        questions:[
          {q:'What time does Maria wake up?',options:['6:00','7:00','8:00','9:00'],answer:'7:00'},
          {q:'What does her mother make for breakfast?',options:['Cereal','Pancakes','Eggs and toast','Fruit'],answer:'Eggs and toast'},
          {q:'What is Maria\'s favorite subject?',options:['Math','English','Science','History'],answer:'Science'},
          {q:'What does Maria do after school?',options:['Goes home immediately','Plays soccer','Watches TV','Goes to the library'],answer:'Plays soccer'}
        ]
      },
      {
        id:'r2', title:'The Weekend Trip', level:'A2',
        passage:'Last Saturday, David and his wife decided to go to the mountains. They woke up early and packed their car with food, water, and warm clothes. The drive took about two hours. When they arrived, the weather was beautiful and the air was fresh. They started hiking on a trail that went through a forest. After three hours, they reached a beautiful lake where they ate their lunch. David took many photos of the scenery. They rested for an hour and then walked back to the car. On the way home, they stopped at a small restaurant for dinner. It was a perfect day.',
        questions:[
          {q:'When did they go to the mountains?',options:['Last Sunday','Last Saturday','Last Friday','Last Monday'],answer:'Last Saturday'},
          {q:'How long was the drive?',options:['One hour','Two hours','Three hours','Four hours'],answer:'Two hours'},
          {q:'Where did they eat lunch?',options:['A restaurant','A cabin','A lake','A forest'],answer:'A lake'},
          {q:'What did David take photos of?',options:['Animals','People','The scenery','The car'],answer:'The scenery'}
        ]
      },
      {
        id:'r3', title:'Technology in Our Lives', level:'B1',
        passage:'Technology has changed the way we live, work, and communicate. Twenty years ago, most people used landline phones and wrote letters to stay in touch. Today, smartphones allow us to make video calls, send messages, and share photos instantly with anyone in the world. Social media platforms have made it possible to connect with millions of people. Online shopping has also transformed how we buy things. Instead of going to a store, we can order products from our phones and have them delivered to our doors. However, this rapid change also brings challenges. Many people spend too much time looking at screens, which can affect their health and relationships. Finding a balance between technology and real life is important for everyone.',
        questions:[
          {q:'What did most people use 20 years ago?',options:['Smartphones','Landline phones','Computers','Tablets'],answer:'Landline phones'},
          {q:'What can smartphones do according to the text?',options:['Only make calls','Cook food','Video calls, messages, and share photos','Drive cars'],answer:'Video calls, messages, and share photos'},
          {q:'What is a challenge of technology mentioned?',options:['It is too expensive','It is hard to learn','People spend too much time on screens','It breaks easily'],answer:'People spend too much time on screens'},
          {q:'What does the text suggest is important?',options:['Using more technology','Ignoring technology completely','Finding a balance between technology and real life','Only using technology for work'],answer:'Finding a balance between technology and real life'}
        ]
      },
      {
        id:'r4', title:'The History of Coffee', level:'B2',
        passage:'Coffee is one of the most popular beverages in the world, consumed by millions of people every day. Its history dates back to the 9th century in Ethiopia, where legend has it that a goat herder named Kaldi noticed his goats became unusually energetic after eating berries from a particular tree. He tried the berries himself and felt a similar effect. Coffee eventually spread to the Arab world, where it was first cultivated commercially. By the 15th century, coffee houses had become important social centers in the Middle East. European traders brought coffee to Europe in the 17th century, where it quickly gained popularity. Today, coffee is grown in over 70 countries and is a multi-billion dollar industry. Brazil is currently the world\'s largest coffee producer, followed by Vietnam and Colombia.',
        questions:[
          {q:'Where did coffee originate?',options:['Arabia','Ethiopia','Brazil','Colombia'],answer:'Ethiopia'},
          {q:'What did Kaldi notice about his goats?',options:['They were sleepy','They became energetic','They stopped eating','They were sick'],answer:'They became energetic'},
          {q:'What became important social centers in the Middle East?',options:['Churches','Schools','Coffee houses','Markets'],answer:'Coffee houses'},
          {q:'Which country is the largest coffee producer today?',options:['Ethiopia','Vietnam','Colombia','Brazil'],answer:'Brazil'},
          {q:'What is the main idea of the passage?',options:['How to make coffee','The history and global impact of coffee','Coffee farmers in Brazil','Why coffee is bad for health'],answer:'The history and global impact of coffee'}
        ]
      }
    ];

    async function init() {
      currentUser = await getUser();
      if (!currentUser) { window.location.href = 'login.html'; return; }
      try {
        let profile = await getProfile(currentUser.id);
      if (!profile) {
        profile = { full_name: currentUser.email, level: 'A1', streak: 0, total_exercises: 0, accuracy: 0 };
      }
        const initials = profile.full_name ? profile.full_name.split(' ').map(n=>n[0]).join('').toUpperCase() : currentUser.email[0].toUpperCase();
        document.getElementById('userAvatar').textContent = initials;
        document.getElementById('userName').textContent = profile.full_name || currentUser.email;
        document.getElementById('levelBadge').textContent = profile.level || 'A1';
      } catch(e) {}
      passages = readingPassages;
      document.getElementById('questionCounter').textContent = 'Passage 1 of ' + passages.length;
      renderPassage();
    }

    function renderPassage() {
      if (currentPassageIndex >= passages.length) { showResults(); return; }
      const passage = passages[currentPassageIndex];
      document.getElementById('questionCounter').textContent = 'Passage ' + (currentPassageIndex+1) + ' of ' + passages.length;
      document.getElementById('accuracyVal').textContent = (correctAnswers+incorrectAnswers)>0 ? Math.round((correctAnswers/(correctAnswers+incorrectAnswers))*100)+'%' : '0%';

      let questionsHtml = passage.questions.map((q,qi) => {
        const qId = passage.id+'_'+qi;
        return '<div class="reading-question fade-in" style="animation-delay:'+(qi+1)*0.1+'s"><div class="question-number">Question '+(qi+1)+' of '+passage.questions.length+'</div><h4>'+q.q+'</h4><div class="options-list">'+q.options.map(opt => '<div class="option-item" data-qid="'+qId+'" data-value="'+opt+'" onclick="selectAnswer(\''+qId+'\', \''+opt.replace(/'/g,"\\'")+'\', this)"><div class="option-radio"></div><span class="option-text">'+opt+'</span></div>').join('')+'</div></div>';
      }).join('');

      document.getElementById('readingContent').innerHTML = '<div class="reading-passage fade-in"><h3>'+passage.title+'</h3><p>'+passage.passage+'</p></div><div id="questionsContainer">'+questionsHtml+'</div><div id="feedbackArea"></div><div style="display:flex;gap:1rem;margin-top:1.5rem;"><button class="btn btn-primary" id="checkAllBtn" onclick="checkAllAnswers()" style="flex:1;">Check All Answers</button><button class="btn btn-outline" id="nextBtn" onclick="nextPassage()" style="flex:1;display:none;">Next Passage <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div>';
    }

    function selectAnswer(qid, value, el) {
      if (answeredQuestions[qid] !== undefined) return;
      document.querySelectorAll('[data-qid="'+qid+'"]').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      answeredQuestions[qid] = value;
    }

    function checkAllAnswers() {
      const passage = passages[currentPassageIndex];
      let passageCorrect = 0;
      passage.questions.forEach((q,qi) => {
        const qId = passage.id+'_'+qi;
        const userAnswer = answeredQuestions[qId];
        const isCorrect = userAnswer === q.answer;
        if (isCorrect) { correctAnswers++; passageCorrect++; }
        else if (userAnswer) { incorrectAnswers++; }
        document.querySelectorAll('[data-qid="'+qId+'"]').forEach(opt => {
          opt.style.pointerEvents = 'none';
          if (opt.dataset.value === q.answer) opt.classList.add('correct');
          else if (opt.classList.contains('selected') && !isCorrect) opt.classList.add('incorrect');
        });
      });
      saveProgress(currentUser.id, null, passageCorrect === passage.questions.length, passage.id).catch(console.error);
      updateStreak(currentUser.id).catch(console.error);
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('incorrectCount').textContent = incorrectAnswers;
      document.getElementById('accuracyVal').textContent = Math.round((correctAnswers/(correctAnswers+incorrectAnswers))*100)+'%';
      const total = passage.questions.length;
      document.getElementById('feedbackArea').innerHTML = '<div class="feedback-box '+(passageCorrect===total?'correct':'incorrect')+'" style="margin-top:1rem;"><div class="feedback-title"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">'+(passageCorrect===total?'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>':'<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>')+'</svg> '+(passageCorrect===total?'Perfect! All correct!':'You got '+passageCorrect+' out of '+total+' correct')+'</div></div>';
      document.getElementById('checkAllBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'block';
    }

    function nextPassage() { currentPassageIndex++; answeredQuestions = {}; renderPassage(); }

    function showResults() {
      const total = correctAnswers + incorrectAnswers;
      const pct = total>0 ? Math.round((correctAnswers/total)*100) : 0;
      if (total > 0) {
        saveScore(currentUser.id, correctAnswers, total, 'reading').catch(console.error);
      }
      const cls = pct>=80?'excellent':pct>=60?'good':'needs-work';
      document.getElementById('readingContent').innerHTML = '<div class="fade-in" style="text-align:center;padding:3rem;"><div class="score-circle '+cls+'">'+pct+'%</div><h2 style="margin-bottom:0.5rem;">Reading Complete!</h2><p style="color:var(--text-secondary);margin-bottom:2rem;">You answered '+correctAnswers+' out of '+total+' questions correctly</p><div style="display:flex;gap:1rem;justify-content:center;"><button class="btn btn-outline" onclick="resetReading()">Try Again</button><a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a></div></div>';
      document.getElementById('questionCounter').textContent = 'Complete!';
    }

    function resetReading() {
      currentPassageIndex=0; correctAnswers=0; incorrectAnswers=0; answeredQuestions={};
      document.getElementById('correctCount').textContent='0';
      document.getElementById('incorrectCount').textContent='0';
      document.getElementById('accuracyVal').textContent='0%';
      document.getElementById('questionCounter').textContent='Passage 1 of '+passages.length;
      renderPassage();
    }

    async function handleLogout() { await signOut(); window.location.href='index.html'; }
    init();
  </script>
</body>
</html>
