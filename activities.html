<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities - English Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-icon">EN</span>
      English Up
    </a>
    <ul class="nav-links">
      <li><a href="dashboard.html">Home</a></li>
      <li><a href="activities.html" class="active">Activities</a></li>
      <li><a href="progress.html">Progress</a></li>
      <li><a href="speaking.html">Speaking</a></li>
      <li><a href="grammar.html">Writing</a></li>
      <li><a href="reading.html">Reading</a></li>
    </ul>
    <div class="nav-actions">
      <div class="nav-user" id="userMenu">
        <div class="nav-user-avatar" id="userAvatar">--</div>
        <span id="userName">Loading...</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="handleLogout()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </nav>

  <div class="activities-page">
    <div class="activities-container">
      <aside class="sidebar">
        <p class="sidebar-title">Modules</p>
        <ul class="sidebar-menu">
          <li><a href="#" class="active" data-module="grammar" onclick="loadModule('grammar', this)">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            Grammar
          </a></li>
          <li><a href="#" data-module="vocabulary" onclick="loadModule('vocabulary', this)">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Vocabulary
          </a></li>
          <li><a href="#" data-module="writing" onclick="loadModule('writing', this)">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Writing
          </a></li>
        </ul>
      </aside>

      <main class="activity-main">
        <div class="activity-header">
          <h1 id="moduleTitle">Grammar Exercises</h1>
          <span style="color: var(--text-secondary);" id="questionCounter">Question 1 of 0</span>
        </div>

        <div class="activity-content" id="exerciseContent">
          <div style="text-align: center; padding: 3rem; color: var(--text-secondary);">
            <p>Loading exercises...</p>
          </div>
        </div>

        <div class="stats-sidebar">
          <h3>
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
            Stats
          </h3>
          <div class="stat-row">
            <span class="stat-label">Correct Answers</span>
            <span class="stat-number green" id="correctCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Incorrect Answers</span>
            <span class="stat-number red" id="incorrectCount">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Practice Grade</span>
            <span class="stat-number" style="color: var(--primary);" id="practiceGrade">--</span>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/main.js"></script>
  <script>
    let currentUser = null;
    let currentModule = 'grammar';
    let exercises = [];
    let currentIndex = 0;
    let correctAnswers = 0;
    let incorrectAnswers = 0;

    async function init() {
      currentUser = await getUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      const profile = await getProfile(currentUser.id);
      if (!profile) {
        profile = { full_name: user.email || currentUser.email, level: 'A1', streak: 0, total_exercises: 0, accuracy: 0 };
      }
      const initials = profile.full_name ? profile.full_name.split(' ').map(n => n[0]).join('').toUpperCase() : currentUser.email[0].toUpperCase();
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('userName').textContent = profile.full_name || currentUser.email;

      const params = new URLSearchParams(window.location.search);
      const moduleParam = params.get('module');
      if (moduleParam) currentModule = moduleParam;

      document.querySelector(`[data-module="${currentModule}"]`)?.classList.add('active');
      await loadModule(currentModule);
    }

    async function loadModule(module, el) {
      if (el) {
        document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
      }
      currentModule = module;
      currentIndex = 0;
      correctAnswers = 0;
      incorrectAnswers = 0;
      updateStats();

      const titles = { grammar: 'Grammar Exercises', vocabulary: 'Vocabulary Exercises', writing: 'Writing Exercises' };
      document.getElementById('moduleTitle').textContent = titles[module] || 'Exercises';

      try {
        exercises = await getExercises(module);
        if (exercises.length === 0) {
          document.getElementById('exerciseContent').innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-secondary);"><p>No exercises available yet for this module.</p></div>';
          document.getElementById('questionCounter').textContent = 'No exercises';
          return;
        }
        renderExercise();
      } catch (error) {
        console.error('Error loading exercises:', error);
      }
    }

    function renderExercise() {
      if (currentIndex >= exercises.length) {
        showResults();
        return;
      }

      const ex = exercises[currentIndex];
      const options = ex.options || [];
      document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${exercises.length}`;

      let optionsHtml = '';
      if (options.length > 0) {
        optionsHtml = '<div class="options-list">' + options.map((opt, i) =>
          `<div class="option-item" data-value="${opt}" onclick="selectOption(this, '${opt.replace(/'/g, "\\'")}')">
            <div class="option-radio"></div>
            <span class="option-text">${opt}</span>
          </div>`
        ).join('') + '</div>';
      }

      document.getElementById('exerciseContent').innerHTML = `
        <div class="question-card fade-in">
          <div class="question-number">Question ${currentIndex + 1} of ${exercises.length}</div>
          <div class="question-text">${ex.question}</div>
          ${optionsHtml}
        </div>
        <div id="feedbackArea"></div>
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button class="btn btn-ghost" onclick="prevExercise()" ${currentIndex === 0 ? 'disabled' : ''} style="flex:1;">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Previous
          </button>
          <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" style="flex:2;">
            Check Answer
          </button>
        </div>
      `;
    }

    function selectOption(el, value) {
      document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }

    async function checkAnswer() {
      const selected = document.querySelector('.option-item.selected');
      if (!selected) return;

      const ex = exercises[currentIndex];
      const answer = selected.dataset.value;
      const isCorrect = answer === ex.correct_answer;

      document.querySelectorAll('.option-item').forEach(opt => {
        opt.style.pointerEvents = 'none';
        if (opt.dataset.value === ex.correct_answer) opt.classList.add('correct');
        else if (opt.classList.contains('selected') && !isCorrect) opt.classList.add('incorrect');
      });

      if (isCorrect) correctAnswers++;
      else incorrectAnswers++;

      try {
        await saveProgress(currentUser.id, ex.id, isCorrect, answer);
        await updateStreak(currentUser.id);
      } catch(e) { console.error(e); }

      const feedbackArea = document.getElementById('feedbackArea');
      feedbackArea.innerHTML = `
        <div class="feedback-box ${isCorrect ? 'correct' : 'incorrect'}" style="margin-top:1rem;">
          <div class="feedback-title">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">${isCorrect
              ? '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
              : '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>'}
            </svg>
            ${isCorrect ? 'Correct!' : 'Incorrect'}
          </div>
          <p class="feedback-text">${ex.explanation || (isCorrect ? 'Well done!' : 'The correct answer is: ' + ex.correct_answer)}</p>
        </div>
      `;

      document.getElementById('checkBtn').textContent = 'Next Exercise';
      document.getElementById('checkBtn').onclick = nextExercise;

      updateStats();
    }

    function nextExercise() {
      currentIndex++;
      renderExercise();
    }

    function prevExercise() {
      if (currentIndex > 0) {
        currentIndex--;
        renderExercise();
      }
    }

    function updateStats() {
      document.getElementById('correctCount').textContent = correctAnswers;
      document.getElementById('incorrectCount').textContent = incorrectAnswers;
      const total = correctAnswers + incorrectAnswers;
      if (total > 0) {
        const grade = correctAnswers / total >= 0.9 ? 'A+' : correctAnswers / total >= 0.8 ? 'A' : correctAnswers / total >= 0.7 ? 'B' : correctAnswers / total >= 0.6 ? 'C' : 'D';
        document.getElementById('practiceGrade').textContent = grade;
      }
    }

    function showResults() {
      const percentage = exercises.length > 0 ? Math.round((correctAnswers / exercises.length) * 100) : 0;
      saveScore(currentUser.id, correctAnswers, exercises.length, currentModule).catch(console.error);

      document.getElementById('exerciseContent').innerHTML = `
        <div class="question-card fade-in" style="text-align:center;">
          <div style="font-size:4rem;margin-bottom:1rem;">${percentage >= 70 ? '🎉' : '📚'}</div>
          <h2 style="margin-bottom:1rem;">Module Complete!</h2>
          <div class="stat-value green" style="font-size:3rem;margin-bottom:1rem;">${percentage}%</div>
          <p style="color:var(--text-secondary);margin-bottom:2rem;">You got ${correctAnswers} out of ${exercises.length} correct</p>
          <div style="display:flex;gap:1rem;justify-content:center;">
            <button class="btn btn-outline" onclick="loadModule('${currentModule}')">Try Again</button>
            <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
          </div>
        </div>
      `;
      document.getElementById('questionCounter').textContent = 'Complete!';
    }

    async function handleLogout() {
      await signOut();
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
